name: Build and push image

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha

      # TheTVDB-Projekt-Key nur im CI in die (gitignorierte) Key-Datei schreiben,
      # bevor das Image gebaut wird. Der Key landet dadurch NICHT im Repo, nicht
      # in docker history und nicht als ENV - nur als Konstante im Image.
      - name: TheTVDB-Projekt-Key einbetten
        run: printf 'BUILTIN_TVDB_KEY = "%s"\n' "${{ secrets.TVDB_PROJECT_KEY }}" > app/config_buildkey.py

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # Legt bei jeder neuen Version (config.py) automatisch einen GitHub-Release an.
  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Version aus config.py lesen
        id: ver
        run: echo "version=$(grep -oP 'VERSION\s*=\s*\"\K[^\"]+' app/config.py)" >> "$GITHUB_OUTPUT"

      - name: Release anlegen, falls neu
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.ver.outputs.version }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG existiert bereits - uebersprungen."
          else
            echo "Erstelle Release $TAG ..."
            gh release create "$TAG" --title "$TAG" --generate-notes --target "$GITHUB_SHA"
          fi

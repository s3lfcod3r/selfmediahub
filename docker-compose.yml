services:
  selfmediahub:
    image: ghcr.io/s3lfcod3r/selfmediahub:latest
    container_name: selfmediahub
    ports:
      - "8092:8092"
    environment:
      # Datenquellen (Emby/Jellyfin/Plex/lokal) werden im UI unter
      # Einstellungen -> Datenquellen angelegt, nicht mehr per ENV.
      TMDB_API_KEY: ""
    volumes:
      - ./data:/data
    restart: unless-stopped

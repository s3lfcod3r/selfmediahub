{% extends "base.html" %}
{% block title %}{{ app.APP_NAME }} - {{ t('login.title') }}{% endblock %}
{% block body %}
<main class="auth-wrap">
  <div class="auth-card">
    <div class="auth-head">
      <img src="/static/icon.png" alt="" class="auth-logo" width="56" height="56">
      <div class="auth-brand"><span class="self">Self</span><span class="rest">MediaHub</span></div>
    </div>
    <h1>{{ t('login.title') }}</h1>
    {% if error %}<div class="auth-error">{{ error }}</div>{% endif %}
    <form method="post" action="/login" class="auth-form">
      <label>{{ t('login.username') }}
        <input class="field" name="username" autocomplete="username" autofocus required>
      </label>
      <label>{{ t('login.password') }}
        <input class="field" type="password" name="password" autocomplete="current-password" required>
      </label>
      <button class="btn btn-primary" type="submit">{{ t('login.submit') }}</button>
    </form>
  </div>
</main>
{% endblock %}

{% extends "base.html" %}
{% block title %}{{ app.APP_NAME }} - Einrichtung{% endblock %}
{% block body %}
<div class="setup">
  <div class="wordmark" style="justify-content:center; margin-bottom:24px">
    <img src="/static/icon.png" alt="" class="brand-logo" width="30" height="30">
    <span class="self">Self</span><span class="rest">MediaHub</span>
    <span class="badge">SETUP</span>
  </div>
  <div class="panel">
    <h1>{{ t('setup_src.title') }}</h1>
    <p style="color:var(--self-text-2)">{{ t('setup_src.desc') }}</p>
    <p style="margin-top:18px">
      <a class="btn btn-primary" href="/einstellungen#quellen">{{ t('setup_src.button') }}</a>
    </p>
    <p style="margin-top:14px; color:var(--self-text-3); font-size:13px">
      {{ t('setup_src.hint') }}
    </p>
  </div>
</div>
{% endblock %}

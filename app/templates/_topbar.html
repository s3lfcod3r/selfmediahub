<header class="topbar">
  <div class="wrap topbar-inner">
    <a href="/" class="wordmark" style="text-decoration:none">
      <span class="self">Self</span><span class="rest">MediaHub</span>
      <span class="badge">v{{ app.VERSION }}</span>
    </a>
    <nav class="nav" aria-label="Hauptnavigation">
      <a href="/"          class="{{ 'active' if active == 'home' }}">Übersicht</a>
      <a href="/tags"      class="{{ 'active' if active == 'tags' }}">Tags</a>
      <a href="/regeln"    class="{{ 'active' if active == 'rules' }}">Regeln</a>
    </nav>
    <div class="spacer"></div>
    {% if active == 'home' %}
    <div class="colmenu" id="dispmenu">
      <button class="btn btn-icon" id="dispBtn" title="Cover-Anzeige">&#9881;</button>
      <div class="colmenu-panel" id="dispPanel">
        <label><input type="checkbox" data-disp="fsk" checked> FSK-Ecke</label>
        <label><input type="checkbox" data-disp="res" checked> Auflösung</label>
        <label><input type="checkbox" data-disp="lang" checked> Sprache/UT (unten rechts)</label>
        <label class="disp-lang">Wunschsprache
          <select class="field" id="prefLang">
            <option value="ger">Deutsch</option>
            <option value="eng">Englisch</option>
            <option value="jpn">Japanisch</option>
            <option value="fre">Französisch</option>
            <option value="spa">Spanisch</option>
            <option value="ita">Italienisch</option>
            <option value="kor">Koreanisch</option>
            <option value="rus">Russisch</option>
            <option value="tur">Türkisch</option>
            <option value="pol">Polnisch</option>
            <option value="nld">Niederländisch</option>
            <option value="por">Portugiesisch</option>
            <option value="chi">Chinesisch</option>
            <option value="ara">Arabisch</option>
          </select>
        </label>
      </div>
    </div>
    {% endif %}
    <button class="btn btn-icon" id="themeBtn" title="Hell/Dunkel" aria-label="Theme umschalten">◐</button>
    <button class="btn btn-primary" id="syncBtn"><span id="syncLabel">Neu einlesen</span></button>
  </div>
</header>
<div class="toast" id="toast"></div>
<script src="/static/js/common.js"></script>

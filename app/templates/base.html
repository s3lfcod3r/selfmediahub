<!doctype html>
<html lang="{{ ui_lang or 'de' }}" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ app.APP_NAME }}{% endblock %}</title>
  <link rel="icon" type="image/png" href="/static/icon.png">
  <link rel="apple-touch-icon" href="/static/icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/tokens.css">
  <link rel="stylesheet" href="/static/css/app.css">
  <script>
    window.__LANG__ = "{{ ui_lang or 'de' }}";
    window.__T__ = {{ (i18n_catalog or {}) | tojson }};
    window.t = function (k) {
      return (window.__T__ && window.__T__[k] !== undefined) ? window.__T__[k] : k;
    };
  </script>
</head>
<body>
  {% block body %}{% endblock %}
</body>
</html>
